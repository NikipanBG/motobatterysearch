<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АВТОЗОНА 33 - Търсачка за Акумулатори</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; }
        select { background-color: #111111 !important; border: 2px solid #333333 !important; color: #ffffff !important; font-weight: 900 !important; font-size: 1.25rem !important; padding: 18px !important; width: 100%; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; }
        select:focus { border-color: #ff0000 !important; }
        .red-accent { color: #ff0000; }
        .card-glass { background: #111; border: 2px solid #222; transition: 0.3s; border-radius: 8px; cursor: pointer; }
        .card-glass.active { border-color: #ff0000; background: #1a0000; }
        .tab-btn { cursor: pointer; padding: 20px 40px; font-weight: 900; border-bottom: 4px solid transparent; color: #444; transition: 0.3s; }
        .tab-btn.active { border-color: #ff0000; color: #fff; }
        .step-circle { background: #ff0000; width: 35px; height: 35px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 900; }
    </style>
</head>
<body>
    <header class="bg-black border-b-2 border-red-600 p-6 sticky top-0 z-50">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="text-4xl font-black italic">АВТОЗОНА <span class="red-accent">33</span> ЕООД</div>
            <div class="flex gap-8 mt-4 md:mt-0 font-black text-sm uppercase">
                <a href="tel:+359888333333" class="hover:text-red-500"><i class="fas fa-phone red-accent mr-2"></i> 0888 33 33 33</a>
                <a href="mailto:office@autozona33.com" class="hover:text-red-500"><i class="fas fa-envelope red-accent mr-2"></i> OFFICE@AUTOZONA33.COM</a>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto py-12 px-4">
        <div class="flex justify-center mb-12 border-b border-zinc-900">
            <div id="tab1" class="tab-btn active" onclick="switchTab(1)">Търсене по Мотор</div>
            <div id="tab2" class="tab-btn" onclick="switchTab(2)">Търсене по Характеристики</div>
        </div>

        <!-- ТЪРСЕНЕ ПО МОТОР -->
        <div id="mode-model" class="space-y-12">
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-8">
                <div class="card-glass p-8 text-center active" data-cat="Moto" onclick="selectCat('Moto', this)"><i class="fas fa-motorcycle text-4xl mb-3 red-accent"></i><p class="font-black text-sm uppercase">Мотор</p></div>
                <div class="card-glass p-8 text-center" data-cat="ATV" onclick="selectCat('ATV', this)"><i class="fas fa-truck-monster text-4xl mb-3 red-accent"></i><p class="font-black text-sm uppercase">ATV</p></div>
                <div class="card-glass p-8 text-center" data-cat="Snow" onclick="selectCat('Snow', this)"><i class="fas fa-snowflake text-4xl mb-3 red-accent"></i><p class="font-black text-sm uppercase">Сноумобил</p></div>
                <div class="card-glass p-8 text-center" data-cat="Jet" onclick="selectCat('Jet', this)"><i class="fas fa-water text-4xl mb-3 red-accent"></i><p class="font-black text-sm uppercase">Джет</p></div>
            </div>
            <div><label class="text-red-600 font-black">Марка</label><select id="brand" onchange="updateCC()"><option value="">Избери Марка</option></select></div>
            <div class="grid grid-cols-2 gap-4"><div><label class="text-red-600 font-black">Кубатура (CC)</label><select id="cc" onchange="updateModels()" disabled><option value="">Кубатура</option></select></div>
            <div><label class="text-red-600 font-black">Модел</label><select id="model" onchange="updateYears()" disabled><option value="">Модел</option></select></div></div>
            <div><label class="text-red-600 font-black">Година</label><select id="year" onchange="findByMotor()" disabled><option value="">Година</option></select></div>
        </div>

        <!-- ТЪРСЕНЕ ПО ХАРАКТЕРИСТИКИ -->
        <div id="mode-specs" class="hidden space-y-10">
            <div class="bg-zinc-950 p-10 rounded-xl border border-zinc-900">
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                    <div><label class="text-red-600 font-black">Дължина (mm)</label><select id="s-length" onchange="filterBySpecs()"><option value="">Всички</option></select></div>
                    <div><label class="text-red-600 font-black">Ширина (mm)</label><select id="s-width" onchange="filterBySpecs()"><option value="">Всички</option></select></div>
                    <div><label class="text-red-600 font-black">Височина (mm)</label><select id="s-height" onchange="filterBySpecs()"><option value="">Всички</option></select></div>
                </div>
                <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
                    <div><label class="text-red-600 font-black">Полюс</label><select id="s-pole" onchange="filterBySpecs()"><option value="">Всички</option><option value="L+">Ляв (+)</option><option value="R+">Десен (+)</option></select></div>
                    <div><label class="text-red-600 font-black">Ah</label><select id="s-ah" onchange="filterBySpecs()"><option value="">Всички</option></select></div>
                    <div><label class="text-red-600 font-black">CCA (A)</label><select id="s-cca" onchange="filterBySpecs()"><option value="">Всички</option></select></div>
                </div>
            </div>
        </div>

        <!-- РЕЗУЛТАТ -->
        <div id="result" class="hidden mt-16 p-10 rounded-lg border-l-8 border-red-600 bg-zinc-900">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
                <div>
                    <p class="text-red-500 font-black uppercase text-sm">ПОДХОДЯЩ АКУМУЛАТОР:</p>
                    <h2 id="res-code" class="text-7xl font-black italic">--</h2>
                    <div id="res-dims" class="text-gray-400 text-lg mt-4 font-bold"></div>
                </div>
                <button class="bg-red-600 text-white px-16 py-6 rounded-sm font-black text-xl hover:bg-red-700">КУПИ СЕГА</button>
            </div>
        </div>
    </main>

    <script>
        let catalogData = []; // от catalog.csv
        let productData = []; // от products.csv

        // Зареждане на двата CSV файла
        window.onload = () => {
            Papa.parse("catalog.csv", { download: true, header: true, complete: function(results) {
                catalogData = results.data.filter(row => row.Brand && row.Battery_Code);
                populateMotorBrands();
            }});
            Papa.parse("products.csv", { download: true, header: true, complete: function(results) {
                productData = results.data.filter(row => row.Battery_Code);
                populateSpecFilters();
            }});
        };

        function populateMotorBrands() {
            let brands = [...new Set(catalogData.map(i => i.Brand))].filter(Boolean).sort();
            let sel = document.getElementById('brand');
            sel.innerHTML = '<option value="">Избери Марка</option>';
            brands.forEach(b => sel.add(new Option(b, b)));
        }

        function updateCC() {
            let brand = document.getElementById('brand').value;
            let sel = document.getElementById('cc');
            sel.innerHTML = '<option value="">Кубатура</option>';
            sel.disabled = !brand;
            if(brand) {
                let ccs = [...new Set(catalogData.filter(i => i.Brand === brand).map(i => i.CC))].filter(Boolean).sort((a,b)=>Number(a)-Number(b));
                ccs.forEach(c => sel.add(new Option(c, c)));
            }
            document.getElementById('model').innerHTML = '<option value="">Модел</option>';
            document.getElementById('model').disabled = true;
            document.getElementById('year').innerHTML = '<option value="">Година</option>';
            document.getElementById('year').disabled = true;
            document.getElementById('result').classList.add('hidden');
        }

        function updateModels() {
            let brand = document.getElementById('brand').value;
            let cc = document.getElementById('cc').value;
            let sel = document.getElementById('model');
            sel.innerHTML = '<option value="">Модел</option>';
            sel.disabled = !cc;
            if(cc) {
                let models = [...new Set(catalogData.filter(i => i.Brand === brand && i.CC === cc).map(i => i.Model))].filter(Boolean).sort();
                models.forEach(m => sel.add(new Option(m, m)));
            }
            document.getElementById('year').innerHTML = '<option value="">Година</option>';
            document.getElementById('year').disabled = true;
            document.getElementById('result').classList.add('hidden');
        }

        function updateYears() {
            let brand = document.getElementById('brand').value;
            let cc = document.getElementById('cc').value;
            let model = document.getElementById('model').value;
            let sel = document.getElementById('year');
            sel.innerHTML = '<option value="">Година</option>';
            sel.disabled = !model;
            if(model) {
                let years = [...new Set(catalogData.filter(i => i.Brand === brand && i.CC === cc && i.Model === model).map(i => i.Year))].filter(Boolean).sort((a,b)=>b-a);
                years.forEach(y => sel.add(new Option(y, y)));
            }
            document.getElementById('result').classList.add('hidden');
        }

        function findByMotor() {
            let brand = document.getElementById('brand').value;
            let cc = document.getElementById('cc').value;
            let model = document.getElementById('model').value;
            let year = document.getElementById('year').value;
            let match = catalogData.find(i => i.Brand === brand && i.CC === cc && i.Model === model && i.Year === year);
            if(match) showFinalResult(match.Battery_Code);
            else alert("Няма намерен акумулатор за тази комбинация.");
        }

        function populateSpecFilters() {
            if(!productData.length) return;
            let fill = (id, col) => {
                let vals = [...new Set(productData.map(i => i[col]).filter(v => v && v !== ""))].sort((a,b)=>Number(a)-Number(b));
                let sel = document.getElementById(id);
                sel.innerHTML = '<option value="">Всички</option>';
                vals.forEach(v => sel.add(new Option(v, v)));
            };
            fill('s-length', 'Length');
            fill('s-width', 'Width');
            fill('s-height', 'Height');
            fill('s-ah', 'Capacity');
            fill('s-cca', 'CCA');
        }

        function filterBySpecs() {
            let length = document.getElementById('s-length').value;
            let width = document.getElementById('s-width').value;
            let height = document.getElementById('s-height').value;
            let pole = document.getElementById('s-pole').value;
            let ah = document.getElementById('s-ah').value;
            let cca = document.getElementById('s-cca').value;

            let match = productData.find(b => 
                (!length || Number(b.Length) === Number(length)) &&
                (!width || Number(b.Width) === Number(width)) &&
                (!height || Number(b.Height) === Number(height)) &&
                (!pole || b.Pole === pole) &&
                (!ah || Number(b.Capacity) === Number(ah)) &&
                (!cca || Number(b.CCA) === Number(cca))
            );
            if(match) showFinalResult(match.Battery_Code);
            else alert("Няма акумулатор с тези параметри.");
        }

        function showFinalResult(code) {
            let details = productData.find(p => p.Battery_Code === code);
            if(details) {
                document.getElementById('res-code').innerText = details.Battery_Code;
                document.getElementById('res-dims').innerHTML = `Размер: ${details.Length}×${details.Width}×${details.Height} mm | Полюс: ${details.Pole || "стандартен"} | ${details.Capacity}Ah | ${details.CCA} CCA`;
                document.getElementById('result').classList.remove('hidden');
            }
        }

        function selectCat(cat, el) {
            document.querySelectorAll('.card-glass').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function switchTab(id) {
            document.getElementById('mode-model').classList.toggle('hidden', id !== 1);
            document.getElementById('mode-specs').classList.toggle('hidden', id !== 2);
            document.getElementById('tab1').classList.toggle('active', id === 1);
            document.getElementById('tab2').classList.toggle('active', id === 2);
            document.getElementById('result').classList.add('hidden');
        }
    </script>
</body>
</html>
