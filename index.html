<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АВТОЗОНА 33 - Търсачка за Акумулатори</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"></style>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000000; color: #ffffff; font-family: 'Inter', sans-serif; -webkit-font-smoothing: antialiased; }
        select { background-color: #111111 !important; border: 2px solid #333333 !important; color: #ffffff !important; font-weight: 900 !important; font-size: 1.25rem !important; padding: 18px !important; width: 100%; border-radius: 4px; text-transform: uppercase; letter-spacing: 1px; cursor: pointer; transition: all 0.3s ease; }
        select:focus { border-color: #ff0000 !important; outline: none; box-shadow: 0 0 15px rgba(255,0,0,0.3); }
        .font-headline { font-family: 'Archivo Black', sans-serif; text-transform: uppercase; letter-spacing: -1px; }
        .card-glass { background: rgba(10, 10, 10, 0.75); border: 1px solid #222222; backdrop-filter: blur(20px); transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .card-glass:hover { border-color: #444444; background: rgba(15, 15, 15, 0.9); transform: translateY(-2px); }
        .card-glass.active { border-color: #ff0000; box-shadow: 0 0 25px rgba(255,0,0,0.15); background: rgba(20, 10, 10, 0.8); }
        .tab-btn { position: relative; font-weight: 900; font-size: 1.1rem; letter-spacing: 1px; text-transform: uppercase; transition: all 0.3s; color: #666666; }
        .tab-btn.active { color: #ffffff; }
        .tab-btn.active::after { content: ''; position: absolute; bottom: -10px; left: 0; width: 100%; height: 4px; background: #ff0000; }
        .btn-action { background: #ffffff; color: #000000; font-weight: 900; text-transform: uppercase; letter-spacing: 1px; transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1); }
        .btn-action:hover { background: #ff0000; color: #ffffff; transform: scale(1.02); box-shadow: 0 10px 20px rgba(255,0,0,0.2); }
        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-track { background: #000000; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #333333; border-radius: 3px; }
        .custom-scroll::-webkit-scrollbar-thumb:hover { background: #ff0000; }
    </style>
</head>
<body class="min-h-screen flex flex-col justify-between p-4 md:p-8">

    <header class="w-full max-w-6xl mx-auto flex flex-col md:flex-row justify-between items-center gap-6 border-b border-zinc-900 pb-6 mb-8">
        <div class="flex items-center gap-4">
            <div class="w-12 h-12 bg-red-600 flex items-center justify-center font-headline text-2xl text-black font-black">33</div>
            <div>
                <h1 class="font-headline text-2xl md:text-3xl tracking-tighter leading-none">АВТОЗОНА 33</h1>
                <p class="text-xs text-zinc-500 uppercase tracking-widest mt-1">ПРОФЕСИОНАЛНИ АКУМУЛАТОРИ ЗА МОТОЦИКЛЕТИ</p>
            </div>
        </div>
        <div class="flex gap-8">
            <button id="tab1" onclick="switchTab(1)" class="tab-btn active">ТЪРСЕНЕ ПО МОДЕЛ</button>
            <button id="tab2" onclick="switchTab(2)" class="tab-btn">ПО СПЕЦИФИКАЦИИ</button>
        </div>
    </header>

    <main class="w-full max-w-6xl mx-auto grid grid-cols-1 lg:grid-cols-12 gap-8 items-start my-auto">
        
        <div class="lg:col-span-4 grid grid-cols-1 gap-4">
            <div onclick="selectCat('Motorcycles', this)" class="card-glass active p-6 flex items-center justify-between cursor-pointer rounded">
                <div class="flex items-center gap-4">
                    <i class="fa-solid fa-motorcycle text-2xl text-zinc-400"></i>
                    <div>
                        <h3 class="font-headline text-lg">МОТОЦИКЛЕТИ</h3>
                        <p class="text-xs text-zinc-500 uppercase">Пътни и пистови</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-zinc-600 text-sm"></i>
            </div>

            <div onclick="selectCat('ATV', this)" class="card-glass p-6 flex items-center justify-between cursor-pointer rounded">
                <div class="flex items-center gap-4">
                    <i class="fa-solid fa-trailer text-2xl text-zinc-400"></i>
                    <div>
                        <h3 class="font-headline text-lg">ATV / UTV</h3>
                        <p class="text-xs text-zinc-500 uppercase">Четириколки и бъгита</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-zinc-600 text-sm"></i>
            </div>

            <div onclick="selectCat('Scooter', this)" class="card-glass p-6 flex items-center justify-between cursor-pointer rounded">
                <div class="flex items-center gap-4">
                    <i class="fa-solid fa-moped text-2xl text-zinc-400"></i>
                    <div>
                        <h3 class="font-headline text-lg">СКУТЕРИ</h3>
                        <p class="text-xs text-zinc-500 uppercase">Градска мобилност</p>
                    </div>
                </div>
                <i class="fa-solid fa-chevron-right text-zinc-600 text-sm"></i>
            </div>
        </div>

        <div class="lg:col-span-8 bg-[#0a0a0a] border border-zinc-900 p-6 md:p-10 rounded flex flex-col justify-between min-h-[480px]">
            
            <div id="mode-model" class="grid grid-cols-1 md:grid-cols-2 gap-6">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">1. Марка</label>
                    <select id="brand" onchange="updateCC()">
                        <option value="">Изберете марка</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">2. Кубатура (CC)</label>
                    <select id="cc" onchange="updateModel()" disabled>
                        <option value="">Изберете първо марка</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">3. Модел</label>
                    <select id="model" onchange="updateYear()" disabled>
                        <option value="">Изберете първо кубатура</option>
                    </select>
                </div>

                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">4. Година</label>
                    <select id="year" disabled>
                        <option value="">Изберете първо модел</option>
                    </select>
                </div>

                <div class="md:col-span-2 mt-4">
                    <button onclick="findByMotor()" class="btn-action w-full py-5 rounded text-center">НАМЕРИ АКУМУЛАТОР</button>
                </div>
            </div>

            <div id="mode-specs" class="grid grid-cols-1 md:grid-cols-3 gap-6 hidden">
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Капацитет (Ah)</label>
                    <select id="spec-ah">
                        <option value="">Всички</option>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Волтаж (V)</label>
                    <select id="spec-v">
                        <option value="">Всички</option>
                    </select>
                </div>
                <div class="flex flex-col gap-2">
                    <label class="text-xs font-bold text-zinc-500 uppercase tracking-wider">Поляритет</label>
                    <select id="spec-pol">
                        <option value="">Всички</option>
                    </select>
                </div>
                <div class="md:col-span-3 mt-4">
                    <button class="btn-action w-full py-5 rounded text-center">ФИЛТРИРАЙ</button>
                </div>
            </div>

            <div id="result" class="mt-8 pt-8 border-t border-zinc-950 hidden">
                <div class="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-[#111] p-6 border-l-4 border-red-600">
                    <div>
                        <span class="text-xs text-zinc-500 uppercase tracking-widest font-bold">Препоръчителен модел акумулатор</span>
                        <h2 id="result-code" class="font-headline text-3xl md:text-4xl text-white mt-1">YTX9-BS</h2>
                    </div>
                    <button class="w-full md:w-auto bg-red-600 hover:bg-red-700 text-white font-black px-8 py-4 rounded text-sm uppercase tracking-wider transition-all">
                        Виж цена и наличност
                    </button>
                </div>
            </div>

        </div>
    </main>

    <footer class="w-full max-w-6xl mx-auto border-t border-zinc-900 pt-6 mt-8 flex flex-col md:flex-row justify-between text-xs text-zinc-600 uppercase tracking-wider gap-4">
        <div>© 2026 АВТОЗОНА 33. ВСИЧКИ ПРАВА ЗАПАЗЕНИ.</div>
        <div class="flex gap-6">
            <a href="#" class="hover:text-zinc-400">Контакти</a>
            <a href="#" class="hover:text-zinc-400">Магазини</a>
            <a href="#" class="hover:text-zinc-400">Условия за ползване</a>
        </div>
    </footer>

    <script>
        let catalogData = [];
        let currentCategory = 'Motorcycles';

        // Автоматично зареждане на данните от същата папка в GitHub
        window.addEventListener('DOMContentLoaded', () => {
            Papa.parse("yuasa bike csv.csv", {
                download: true,
                header: false, // Файлът няма заглавен ред на първия ред
                skipEmptyLines: true,
                delimiter: ";", // Ползваме точка и запетая спрямо оригиналния CSV файл
                complete: function(results) {
                    // Мапваме редовете към структуриран обект
                    catalogData = results.data.map(row => {
                        // Намираме първия реален наличен код за акумулатор в колони от 5 нататък
                        let batteryCode = "";
                        for(let i = 5; i < row.length; i++) {
                            if(row[i] && row[i].trim() !== "-" && row[i].trim() !== "") {
                                batteryCode = row[i].trim();
                                break;
                            }
                        }
                        
                        return {
                            Category: row[0] ? row[0].trim() : "",
                            Brand: row[1] ? row[1].trim() : "",
                            CC: row[2] ? row[2].trim() : "",
                            Model: row[3] ? row[3].trim() : "",
                            Year: row[4] ? row[4].trim() : "",
                            Battery_Code: batteryCode
                        };
                    }).filter(item => item.Brand && item.Brand !== "Brand"); // Махаме празни или заглавни редове
                    
                    initFilters();
                },
                error: function(err) {
                    console.error("Грешка при зареждане на CSV файла:", err);
                }
            });
        });

        function initFilters() {
            let filtered = catalogData.filter(i => i.Category.toLowerCase() === currentCategory.toLowerCase() || currentCategory === 'Motorcycles');
            let brands = [...new Set(filtered.map(i => i.Brand))].sort();
            
            let brandSel = document.getElementById('brand');
            brandSel.innerHTML = '<option value="">Изберете марка</option>';
            brands.forEach(b => {
                brandSel.innerHTML += `<option value="${b}">${b}</option>`;
            });

            document.getElementById('cc').disabled = true;
            document.getElementById('model').disabled = true;
            document.getElementById('year').disabled = true;
            document.getElementById('result').classList.add('hidden');
        }

        function updateCC() {
            let brand = document.getElementById('brand').value;
            let ccSel = document.getElementById('cc');
            
            if(!brand) {
                ccSel.disabled = true;
                return;
            }

            let filtered = catalogData.filter(i => i.Brand === brand);
            let ccs = [...new Set(filtered.map(i => i.CC))].sort((a, b) => parseInt(a) - parseInt(b));

            ccSel.innerHTML = '<option value="">Изберете кубатура</option>';
            ccs.forEach(c => {
                ccSel.innerHTML += `<option value="${c}">${c} cc</option>`;
            });

            ccSel.disabled = false;
            document.getElementById('model').disabled = true;
            document.getElementById('year').disabled = true;
        }

        function updateModel() {
            let brand = document.getElementById('brand').value;
            let cc = document.getElementById('cc').value;
            let modelSel = document.getElementById('model');

            if(!cc) {
                modelSel.disabled = true;
                return;
            }

            let filtered = catalogData.filter(i => i.Brand === brand && i.CC === cc);
            let models = [...new Set(filtered.map(i => i.Model))].sort();

            modelSel.innerHTML = '<option value="">Изберете модел</option>';
            models.forEach(m => {
                modelSel.innerHTML += `<option value="${m}">${m}</option>`;
            });

            modelSel.disabled = false;
            document.getElementById('year').disabled = true;
        }

        function updateYear() {
            let brand = document.getElementById('brand').value;
            let cc = document.getElementById('cc').value;
            let model = document.getElementById('model').value;
            let yearSel = document.getElementById('year');

            if(!model) {
                yearSel.disabled = true;
                return;
            }

            let filtered = catalogData.filter(i => i.Brand === brand && i.CC === cc && i.Model === model);
            let years = [...new Set(filtered.map(i => i.Year))].sort();

            yearSel.innerHTML = '<option value="">Изберете година</option>';
            years.forEach(y => {
                yearSel.innerHTML += `<option value="${y}">${y}</option>`;
            });

            yearSel.disabled = false;
        }

        function findByMotor() {
            let brand = document.getElementById('brand').value;
            let cc = document.getElementById('cc').value;
            let model = document.getElementById('model').value;
            let year = document.getElementById('year').value;

            if(!brand || !cc || !model || !year) {
                alert("Моля, изберете всички полета.");
                return;
            }

            let match = catalogData.find(i => i.Brand === brand && i.CC === cc && i.Model === model && i.Year === year);
            
            if(match && match.Battery_Code) {
                showFinalResult(match.Battery_Code);
            } else {
                document.getElementById('result').classList.add('hidden');
                alert("Няма намерен съвместим акумулатор в базата данни.");
            }
        }

        function showFinalResult(code) {
            document.getElementById('result-code').innerText = code;
            document.getElementById('result').classList.remove('hidden');
        }

        function selectCat(cat, el) {
            document.querySelectorAll('.card-glass').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
            currentCategory = cat;
            initFilters();
        }

        function switchTab(id) {
            document.getElementById('mode-model').classList.toggle('hidden', id !== 1);
            document.getElementById('mode-specs').classList.toggle('hidden', id !== 2);
            document.getElementById('tab1').classList.toggle('active', id === 1);
            document.getElementById('tab2').classList.toggle('active', id === 2);
            document.getElementById('result').classList.add('hidden');
        }
    </script>
</body>
</html>
