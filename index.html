<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АВТОЗОНА 33 - Търсачка</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .red-accent { color: #ff0000; }
        select { 
            background: #111 !important; border: 2px solid #333 !important; color: #fff !important;
            font-weight: 900 !important; font-size: 1.1rem !important; padding: 12px !important; width: 100%;
        }
        .tab-btn { cursor: pointer; padding: 15px; font-weight: 900; color: #555; border-bottom: 3px solid transparent; text-transform: uppercase; }
        .tab-btn.active { color: #fff; border-color: #ff0000; }
        .spec-label { color: #ff0000; font-size: 10px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

<header class="p-6 border-b-2 border-red-600 text-center">
    <h1 class="text-3xl font-black italic uppercase">АВТОЗОНА <span class="red-accent">33</span></h1>
</header>

<main class="max-w-4xl mx-auto p-4">
    <div class="flex justify-center gap-4 mb-8">
        <div id="t1" class="tab-btn active" onclick="switchTab(1)">По Мотор</div>
        <div id="t2" class="tab-btn" onclick="switchTab(2)">Технически данни</div>
    </div>

    <div id="mode1" class="space-y-4">
        <select id="brand" onchange="updateCC()"><option value="">МАРКА</option></select>
        <div class="grid grid-cols-2 gap-4">
            <select id="cc" onchange="updateModels()" disabled><option value="">CC</option></select>
            <select id="model" onchange="updateYears()" disabled><option value="">МОДЕЛ</option></select>
        </div>
        <select id="year" onchange="findMotor()" disabled><option value="">ГОДИНА</option></select>
    </div>

    <div id="mode2" class="hidden grid grid-cols-1 md:grid-cols-3 gap-4 bg-zinc-900 p-6 rounded">
        <div><label class="spec-label">Волтаж</label><select id="s-v" onchange="filterSpecs()"><option value="">Всички</option></select></div>
        <div><label class="spec-label">Капацитет</label><select id="s-ah" onchange="filterSpecs()"><option value="">Всички</option></select></div>
        <div><label class="spec-label">Стартов ток</label><select id="s-cca" onchange="filterSpecs()"><option value="">Всички</option></select></div>
        <div><label class="spec-label">Дължина (L)</label><select id="s-l" onchange="filterSpecs()"><option value="">Всички</option></select></div>
        <div><label class="spec-label">Ширина (W)</label><select id="s-w" onchange="filterSpecs()"><option value="">Всички</option></select></div>
        <div><label class="spec-label">Височина (H)</label><select id="s-h" onchange="filterSpecs()"><option value="">Всички</option></select></div>
    </div>

    <div id="result" class="hidden mt-8 p-6 bg-zinc-800 border-l-4 border-red-600">
        <h2 id="res-code" class="text-5xl font-black italic mb-4">--</h2>
        <div id="res-details" class="grid grid-cols-2 gap-4 text-sm mb-6"></div>
        <div class="text-right">
            <span class="text-xs font-bold text-zinc-500 uppercase">Цена (RRP):</span>
            <div id="res-price" class="text-3xl font-black red-accent">-- лв.</div>
        </div>
    </div>
</main>

<script>
    let catalog = [], products = [];

    window.onload = () => {
        // Зареждане на каталога
        Papa.parse('catalog.csv', { download: true, header: true, skipEmptyLines: true, 
            complete: r => { catalog = r.data; fillBrands(); }
        });

        // Зареждане на продуктите (прескачаме заглавните редове автоматично)
        Papa.parse('products.csv', { download: true, header: false, skipEmptyLines: true, 
            complete: r => {
                const start = r.data.findIndex(row => row.includes("Part No."));
                if(start !== -1) {
                    const rows = r.data.slice(start + 2);
                    products = rows.map(row => ({
                        code: row[2], v: row[5], ah: row[6], cca: row[7],
                        l: row[9], w: row[10], h: row[11], rrp: row[15]
                    })).filter(i => i.code);
                    fillSpecs();
                }
            }
        });
    };

    function showResult(code) {
        const p = products.find(i => i.code.trim() === code.trim());
        if(!p) return;
        document.getElementById('res-code').innerText = p.code;
        document.getElementById('res-price').innerText = p.rrp + ' лв.';
        document.getElementById('res-details').innerHTML = `
            <div><span class="red-accent font-bold">V/Ah:</span> ${p.v}V / ${p.ah}Ah</div>
            <div><span class="red-accent font-bold">CCA:</span> ${p.cca}A</div>
            <div><span class="red-accent font-bold">L/W/H:</span> ${p.l}x${p.w}x${p.h}</div>
        `;
        document.getElementById('result').classList.remove('hidden');
    }

    function fillBrands() {
        const b = [...new Set(catalog.map(i => i.Brand))].filter(Boolean).sort();
        const s = document.getElementById('brand');
        b.forEach(x => s.add(new Option(x, x)));
    }

    function updateCC() {
        const b = document.getElementById('brand').value;
        const s = document.getElementById('cc'); s.innerHTML = '<option value="">CC</option>';
        s.disabled = !b;
        if(b) {
            const list = [...new Set(catalog.filter(i => i.Brand === b).map(i => i.CC))].sort((a,b)=>a-b);
            list.forEach(x => s.add(new Option(x, x)));
        }
    }

    function updateModels() {
        const b = document.getElementById('brand').value, c = document.getElementById('cc').value;
        const s = document.getElementById('model'); s.innerHTML = '<option value="">МОДЕЛ</option>';
        s.disabled = !c;
        if(c) {
            const list = [...new Set(catalog.filter(i => i.Brand === b && i.CC === c).map(i => i.Model))].sort();
            list.forEach(x => s.add(new Option(x, x)));
        }
    }

    function updateYears() {
        const b = document.getElementById('brand').value, c = document.getElementById('cc').value, m = document.getElementById('model').value;
        const s = document.getElementById('year'); s.innerHTML = '<option value="">ГОДИНА</option>';
        s.disabled = !m;
        if(m) {
            const list = [...new Set(catalog.filter(i => i.Brand === b && i.CC === c && i.Model === m).map(i => i.Year))].sort((a,b)=>b-a);
            list.forEach(x => s.add(new Option(x, x)));
        }
    }

    function findMotor() {
        const b = document.getElementById('brand').value, c = document.getElementById('cc').value, 
              m = document.getElementById('model').value, y = document.getElementById('year').value;
        const match = catalog.find(i => i.Brand === b && i.CC === c && i.Model === m && i.Year === y);
        if(match) showResult(match.Battery_Code);
    }

    function fillSpecs() {
        const f = (id, key) => {
            const v = [...new Set(products.map(i => i[key]))].filter(x => x && !isNaN(x)).sort((a,b)=>a-b);
            const s = document.getElementById(id);
            v.forEach(x => s.add(new Option(x, x)));
        };
        f('s-v', 'v'); f('s-ah', 'ah'); f('s-cca', 'cca'); f('s-l', 'l'); f('s-w', 'w'); f('s-h', 'h');
    }

    function filterSpecs() {
        const v = document.getElementById('s-v').value, ah = document.getElementById('s-ah').value,
              cca = document.getElementById('s-cca').value, l = document.getElementById('s-l').value,
              w = document.getElementById('s-w').value, h = document.getElementById('s-h').value;
        const match = products.find(i => (!v || i.v === v) && (!ah || i.ah === ah) && (!cca || i.cca === cca) && (!l || i.l === l) && (!w || i.w === w) && (!h || i.h === h));
        match ? showResult(match.code) : document.getElementById('result').classList.add('hidden');
    }

    function switchTab(n) {
        document.getElementById('mode1').classList.toggle('hidden', n !== 1);
        document.getElementById('mode2').classList.toggle('hidden', n !== 2);
        document.getElementById('t1').classList.toggle('active', n === 1);
        document.getElementById('t2').classList.toggle('active', n === 2);
    }
</script>
</body>
</html>
