<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>АВТОЗОНА 33 - Търсачка за Акумулатори</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.0/papaparse.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');
        body { background-color: #000; color: #fff; font-family: 'Inter', sans-serif; }
        .main-container { max-width: 900px; margin: 0 auto; padding: 20px; }
        
        select { 
            background: #111 !important; border: 2px solid #333 !important; 
            color: #fff !important; font-weight: 900 !important; font-size: 1.2rem !important; 
            padding: 14px !important; width: 100%; border-radius: 4px;
        }
        select:focus { border-color: #ff0000 !important; outline: none; }
        
        .red-accent { color: #ff0000; }
        .tab-btn { cursor: pointer; padding: 15px 25px; font-weight: 900; text-transform: uppercase; border-bottom: 4px solid transparent; color: #555; transition: 0.3s; }
        .tab-btn.active { border-color: #ff0000; color: #fff; }
        
        .result-box { background: #111; border-left: 6px solid #ff0000; border-radius: 4px; }
        .spec-item { border-bottom: 1px solid #222; padding: 10px 0; display: flex; justify-content: space-between; }
        .spec-label { color: #ff0000; font-size: 11px; font-weight: 900; text-transform: uppercase; }
    </style>
</head>
<body>

    <header class="bg-black border-b-2 border-red-600 p-6 text-center">
        <h1 class="text-4xl font-black italic">АВТОЗОНА <span class="red-accent">33</span></h1>
    </header>

    <main class="main-container">
        <div class="flex justify-center mb-10 border-b border-zinc-900">
            <div id="tab1" class="tab-btn active" onclick="switchTab(1)">По Мотор</div>
            <div id="tab2" class="tab-btn" onclick="switchTab(2)">По Характеристики</div>
        </div>

        <div id="mode-model" class="space-y-6">
            <select id="brand" onchange="updateCC()"><option value="">Марка Мотор</option></select>
            <div class="grid grid-cols-2 gap-4">
                <select id="cc" onchange="updateModels()" disabled><option value="">CC</option></select>
                <select id="model" onchange="updateYears()" disabled><option value="">Модел</option></select>
            </div>
            <select id="year" onchange="findBattery()" disabled><option value="">Година</option></select>
        </div>

        <div id="mode-specs" class="hidden grid grid-cols-1 md:grid-cols-2 gap-6 bg-zinc-950 p-6 rounded-lg">
            <div><label class="spec-label">Волтаж (V)</label><select id="s-v" onchange="filterSpecs()"><option value="">Всички</option></select></div>
            <div><label class="spec-label">Дължина (L)</label><select id="s-l" onchange="filterSpecs()"><option value="">Всички</option></select></div>
            <div><label class="spec-label">Ширина (W)</label><select id="s-w" onchange="filterSpecs()"><option value="">Всички</option></select></div>
            <div><label class="spec-label">Височина (H)</label><select id="s-h" onchange="filterSpecs()"><option value="">Всички</option></select></div>
            <div><label class="spec-label">Капацитет (Ah)</label><select id="s-ah" onchange="filterSpecs()"><option value="">Всички</option></select></div>
        </div>

        <div id="result" class="hidden mt-10 p-8 result-box">
            <div class="flex flex-col md:flex-row justify-between items-start gap-6">
                <div class="flex-1">
                    <p class="text-zinc-500 text-[10px] font-black tracking-widest">ПРЕПОРЪЧАН МОДЕЛ</p>
                    <h2 id="res-code" class="text-6xl font-black italic red-accent mb-6">--</h2>
                    <div id="res-list" class="space-y-1"></div>
                </div>
                <div class="text-center md:text-right min-w-[200px]">
                    <p class="text-zinc-500 text-[10px] font-black">ЦЕНА (RRP)</p>
                    <div id="res-price" class="text-4xl font-black mb-6 tracking-tighter">-- лв.</div>
                    <button class="bg-red-600 text-white w-full py-4 font-black uppercase italic hover:bg-red-700">КУПИ</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        // ИЗПОЛЗВАМЕ ФАЙЛОВЕТЕ ОТ СЪЩАТА ПАПКА В GITHUB
        const csvCatalog = 'catalog.csv';
        const csvProducts = 'products.csv';

        let dataCatalog = [], dataProducts = [];

        window.onload = () => {
            Papa.parse(csvCatalog, { download: true, header: true, complete: res => { dataCatalog = res.data; fillBrands(); }});
            Papa.parse(csvProducts, { download: true, header: true, complete: res => { dataProducts = res.data; fillSpecs(); }});
        };

        function showResult(code) {
            // Намираме продукта, като чистим интервалите от кода
            const p = dataProducts.find(i => i.Part_No && i.Part_No.trim() === code.trim());
            if(!p) return;

            document.getElementById('res-code').innerText = code;
            document.getElementById('res-price').innerText = (p.RRP || '--') + ' лв.';
            
            // Динамично извеждане на данни според твоите заглавия от снимката
            document.getElementById('res-list').innerHTML = `
                <div class="spec-item"><span class="spec-label">Волтаж</span> <span>${p['Voltage (V)']}V</span></div>
                <div class="spec-item"><span class="spec-label">Капацитет (Ah)</span> <span>${p['Capacity 20h (Ah)']} Ah</span></div>
                <div class="spec-item"><span class="spec-label">Размери (L/W/H)</span> <span>${p.L}x${p.W}x${p.H} mm</span></div>
                <div class="spec-item"><span class="spec-label">Тегло</span> <span>${p['Battery Weight (kg)']} kg</span></div>
                <div class="spec-item"><span class="spec-label">EAN</span> <span>${p.EAN || '-'}</span></div>
            `;
            document.getElementById('result').classList.remove('hidden');
        }

        // --- ЛОГИКА ТЪРСЕНЕ ПО МОТОР ---
        function fillBrands() {
            const brands = [...new Set(dataCatalog.map(i => i.Brand))].filter(Boolean).sort();
            const sel = document.getElementById('brand');
            brands.forEach(b => sel.add(new Option(b, b)));
        }
        function updateCC() {
            const b = document.getElementById('brand').value;
            const sel = document.getElementById('cc'); sel.innerHTML = '<option value="">CC</option>';
            sel.disabled = !b;
            if(b) {
                const ccs = [...new Set(dataCatalog.filter(i => i.Brand === b).map(i => i.CC))].filter(Boolean).sort((a,b)=>a-b);
                ccs.forEach(c => sel.add(new Option(c, c)));
            }
        }
        function updateModels() {
            const b = document.getElementById('brand').value, c = document.getElementById('cc').value;
            const sel = document.getElementById('model'); sel.innerHTML = '<option value="">Модел</option>';
            sel.disabled = !c;
            if(c) {
                const ms = [...new Set(dataCatalog.filter(i => i.Brand === b && i.CC === c).map(i => i.Model))].filter(Boolean).sort();
                ms.forEach(m => sel.add(new Option(m, m)));
            }
        }
        function updateYears() {
            const b = document.getElementById('brand').value, c = document.getElementById('cc').value, m = document.getElementById('model').value;
            const sel = document.getElementById('year'); sel.innerHTML = '<option value="">Година</option>';
            sel.disabled = !m;
            if(m) {
                const ys = [...new Set(dataCatalog.filter(i => i.Brand === b && i.CC === c && i.Model === m).map(i => i.Year))].filter(Boolean).sort((a,b)=>b-a);
                ys.forEach(y => sel.add(new Option(y, y)));
            }
        }
        function findBattery() {
            const b = document.getElementById('brand').value, c = document.getElementById('cc').value, m = document.getElementById('model').value, y = document.getElementById('year').value;
            const match = dataCatalog.find(i => i.Brand === b && i.CC === c && i.Model === m && i.Year === y);
            if(match) showResult(match.Battery_Code);
        }

        // --- ЛОГИКА ТЪРСЕНЕ ПО СПЕЦИФИКАЦИИ ---
        function fillSpecs() {
            const fill = (id, col) => {
                const vals = [...new Set(dataProducts.map(i => i[col]))].filter(Boolean).sort((a,b)=>a-b);
                const sel = document.getElementById(id);
                vals.forEach(v => sel.add(new Option(v, v)));
            };
            fill('s-v', 'Voltage (V)'); fill('s-l', 'L'); fill('s-w', 'W'); fill('s-h', 'H'); fill('s-ah', 'Capacity 20h (Ah)');
        }
        function filterSpecs() {
            const v = document.getElementById('s-v').value, l = document.getElementById('s-l').value, w = document.getElementById('s-w').value, h = document.getElementById('s-h').value, ah = document.getElementById('s-ah').value;
            const match = dataProducts.find(i => (!v || i['Voltage (V)'] === v) && (!l || i.L === l) && (!w || i.W === w) && (!h || i.H === h) && (!ah || i['Capacity 20h (Ah)'] === ah));
            match ? showResult(match.Part_No) : document.getElementById('result').classList.add('hidden');
        }

        function switchTab(id) {
            document.getElementById('mode-model').classList.toggle('hidden', id !== 1);
            document.getElementById('mode-specs').classList.toggle('hidden', id !== 2);
            document.getElementById('tab1').classList.toggle('active', id === 1);
            document.getElementById('tab2').classList.toggle('active', id === 2);
            document.getElementById('result').classList.add('hidden');
        }
    </script>
</body>
</html>
